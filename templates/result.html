<!DOCTYPE html>
<html>
<head><title>Prediction Result</title></head>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<body>
    <h2>Fruit Prediction Result</h2>

    <img src="{{ url_for('static', filename='uploads/' + image_filename) }}" alt="Uplaoded Image" width="250"><br><br>

    <p><strong>Fruit Name:</strong> {{ fruit }}</p>
    <p><strong>Color:</strong> {{ color }}</p>
    <p><strong>Vitamins:</strong> {{ vitamin }}</p>
    <p><strong>Type:</strong> {{ food_type }}</p>
    <p><strong>Confidence:</strong> {{ confidence }} %</p>
    <br>
    <a href="/">Try Another</a>
</body>
</html>
